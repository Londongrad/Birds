name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore
        run: dotnet restore Birds.sln

      - name: Build
        run: dotnet build Birds.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Birds.Tests/Birds.Tests.csproj --configuration Release --no-build --verbosity minimal
